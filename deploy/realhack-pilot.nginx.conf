# RealHack Pilot — nginx site config
# Drop this in /etc/nginx/conf.d/realhack-pilot.conf
#
# - Serves the built React app from /opt/realhack-pilot/app/frontend/dist
# - Proxies /api/* to the FastAPI backend running on 127.0.0.1:8000
# - HTTPS on realhack-judge.realpage.com (wildcard *.realpage.com cert)
# - HTTP redirects to HTTPS
#
# Coexistence note: this nginx box also hosts Pulse (/etc/nginx/conf.d/pulse.conf).
# Pulse owns `default_server` plus rcapaywwaiw002.realpage.com + pulse.realpage.com.
# We only catch traffic explicitly destined for our server_name entries.
#
# SSL cert paths — update these to wherever IT deploys the *.realpage.com wildcard cert:
#   ssl_certificate     /etc/nginx/ssl/realpage-wildcard.crt;
#   ssl_certificate_key /etc/nginx/ssl/realpage-wildcard.key;
# If RealPage uses a chain file, add:
#   ssl_trusted_certificate /etc/nginx/ssl/realpage-wildcard-chain.pem;

# ---- Redirect HTTP → HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name realhack-judge.realpage.com;

    return 301 https://$host$request_uri;
}

# ---- HTTPS — main site ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name realhack-judge.realpage.com;

    # --- SSL cert (*.realpage.com wildcard) ---
    # Update these paths once IT provides / deploys the cert.
    ssl_certificate     /etc/nginx/ssl/realpage-wildcard.crt;
    ssl_certificate_key /etc/nginx/ssl/realpage-wildcard.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logs
    access_log /var/log/nginx/realhack-pilot.access.log;
    error_log  /var/log/nginx/realhack-pilot.error.log warn;

    # Sensible body limits — Excel uploads can be a few MB
    client_max_body_size 25m;

    # ---- Backend API proxy ----
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Bulk AI screening hits the LLM 48 times back-to-back and can run
        # well past 5 minutes. 600s covers worst case; if requests genuinely
        # need longer, the right fix is async background processing rather
        # than nudging this up further.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # ---- Health check passthrough (handy for monitoring) ----
    location = /health {
        proxy_pass http://127.0.0.1:8000/api/health;
        access_log off;
    }

    # ---- Static frontend (Vite build output) ----
    root /opt/realhack-pilot/app/frontend/dist;
    index index.html;

    # SPA routing — always fall back to index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed Vite assets aggressively (they have content hashes in the filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache index.html — it's the entry point that references the hashed bundles
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}

# ---- Legacy HTTP fallback (internal access during transition) ----
# Remove this block once the public hostname is fully live.
server {
    listen 80;
    listen [::]:80;
    server_name realhack.realpage.com rcapaywwaiw002 rcapaywwaiw002.realpage.com;

    access_log /var/log/nginx/realhack-pilot.access.log;
    error_log  /var/log/nginx/realhack-pilot.error.log warn;
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/api/health;
        access_log off;
    }

    root /opt/realhack-pilot/app/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
