# RealHack Pilot — nginx site config
# Drop this in /etc/nginx/conf.d/realhack-pilot.conf
#
# - Serves the built React app from /opt/realhack-pilot/app/frontend/dist
# - Proxies /api/* to the FastAPI backend running on 127.0.0.1:8000
# - HTTP only for the internal-IP demo phase. Add server { listen 443 ssl ... } block
#   later when an internal CA cert / hostname is in place.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;   # accept any hostname / IP for now (internal-only)

    # Logs
    access_log /var/log/nginx/realhack-pilot.access.log;
    error_log  /var/log/nginx/realhack-pilot.error.log warn;

    # Sensible body limits — Excel uploads can be a few MB
    client_max_body_size 25m;

    # ---- Backend API proxy ----
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;            # LLM calls can take 20-60s
        proxy_connect_timeout 10s;
    }

    # ---- Health check passthrough (handy for monitoring) ----
    location = /health {
        proxy_pass http://127.0.0.1:8000/api/health;
        access_log off;
    }

    # ---- Static frontend (Vite build output) ----
    root /opt/realhack-pilot/app/frontend/dist;
    index index.html;

    # SPA routing — always fall back to index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed Vite assets aggressively (they have content hashes in the filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache index.html — it's the entry point that references the hashed bundles
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
